apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-ip-updater
  namespace: cryptoledger
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-ip-updater
  namespace: cryptoledger
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-ip-updater
  namespace: cryptoledger
subjects:
- kind: ServiceAccount
  name: postgres-ip-updater
  namespace: cryptoledger
roleRef:
  kind: Role
  name: postgres-ip-updater
  apiGroup: rbac.authorization.k8s.io
