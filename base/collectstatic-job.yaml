apiVersion: batch/v1
kind: Job
metadata:
  name: crypto-collectstatic
  namespace: crypto
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: collectstatic
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["python", "manage.py", "collectstatic", "--noinput"]
        envFrom:
        - configMapRef:
            name: crypto-config
        - secretRef:
            name: crypto-secrets
