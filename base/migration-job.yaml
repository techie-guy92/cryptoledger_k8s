apiVersion: batch/v1
kind: Job
metadata:
  name: crypto-migrate
  namespace: crypto
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrate
        image: 192.168.122.1:5000/crypto:v1.2.0
        command: ["python", "manage.py", "migrate"]
        envFrom:
        - configMapRef:
            name: crypto-config
        - secretRef:
            name: crypto-secrets
