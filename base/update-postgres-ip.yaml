apiVersion: batch/v1
kind: CronJob
metadata:
  name: update-postgres-ip
  namespace: cryptoledger
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      backoffLimit: 2              
      template:
        spec:
          serviceAccountName: postgres-ip-updater
          restartPolicy: Never
          containers:
          - name: updater
            image: 192.168.122.1:5000/bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - |
              POSTGRES_IP=$(kubectl get pod -l app=postgres -o jsonpath='{.items[0].status.podIP}')
              CURRENT_HOST=$(kubectl get configmap cryptoledger-config -o jsonpath='{.data.DB_HOST}')
              if [ "$POSTGRES_IP" != "$CURRENT_HOST" ]; then
                kubectl patch configmap cryptoledger-config --type='merge' -p "{\"data\":{\"DB_HOST\":\"$POSTGRES_IP\"}}"
                kubectl rollout restart deployment cryptoledger-web
              fi
