apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cryptoledger-ingress
  namespace: cryptoledger
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
  - host: cryptoledger.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cryptoledger-web
            port:
              number: 8003
