apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crypto-ingress
  namespace: crypto
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: crypto.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: crypto-web
            port:
              number: 8000
              