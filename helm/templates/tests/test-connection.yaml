apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cryptoledger.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cryptoledger.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: 192.168.122.1:5000/alpine-curl:latest
      command: ['wget']
      args: ['{{ include "cryptoledger.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
